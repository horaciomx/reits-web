<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REITS</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #f4f7f6; font-family: sans-serif; }

        .loader-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #ddd;
            border-top: 5px solid #1a73e8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            z-index: 2;
            background-color: transparent;
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="spinner"></div>
        <p style="color: #666; font-weight: bold;">Cargando REITS 2026...</p>
        <p style="color: #999; font-size: 12px;">Por favor, espera un momento.</p>
    </div>

    <iframe
        allow="geolocation; microphone; camera"
        onload="this.style.backgroundColor='#ffffff';">
    </iframe>

    <script>
        var base = "https://script.google.com/macros/s/AKfycby-BGoxDVFJy1SY_La9LX6oGI345xy-sPuWmlELLv1wGbpoIM9VE6Aq7dpe8j9M6W1jNw/exec";
        document.querySelector('iframe').src = base + window.location.search;
    </script>

</body>
</html>
